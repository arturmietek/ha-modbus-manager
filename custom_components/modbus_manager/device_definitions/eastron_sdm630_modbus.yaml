    device_class: power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: total_power_demand_max
    name: "Maximum Total System Power Demand"
    register_type: input
    address: 86
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: total_va_demand
    name: "Total System VA Demand"
    register_type: input
    address: 100
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "VA"
    device_class: apparent_power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: total_va_demand_max
    name: "Maximum Total System VA Demand"
    register_type: input
    address: 102
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "VA"
    device_class: apparent_power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: neutral_current_demand
    name: "Neutral Current Demand"
    register_type: input
    address: 104
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 3
    entity_category: diagnostic

  - id: neutral_current_demand_max
    name: "Maximum Neutral Current Demand"
    register_type: input
    address: 106
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 3
    entity_category: diagnostic

  # ── Frequency ─────────────────────────────────────────────────────────────
  - id: frequency
    name: "Frequency"
    register_type: input
    address: 70
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "Hz"
    device_class: frequency
    state_class: measurement
    precision: 2

  # ── Energy counters ───────────────────────────────────────────────────────
  - id: import_active_energy
    name: "Import Active Energy"
    register_type: input
    address: 72
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "kWh"
    device_class: energy
    state_class: total_increasing
    precision: 2

  - id: export_active_energy
    name: "Export Active Energy"
    register_type: input
    address: 74
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "kWh"
    device_class: energy
    state_class: total_increasing
    precision: 2

  - id: import_reactive_energy
    name: "Import Reactive Energy"
    register_type: input
    address: 76
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "kvarh"
    state_class: total_increasing
    precision: 2
    entity_category: diagnostic

  - id: export_reactive_energy
    name: "Export Reactive Energy"
    register_type: input
    address: 78
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "kvarh"
    state_class: total_increasing
    precision: 2
    entity_category: diagnostic

  - id: total_apparent_energy
    name: "Total Apparent Energy"
    register_type: input
    address: 80
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "kVAh"
    state_class: total_increasing
    precision: 2
    entity_category: diagnostic

  # ── Line-to-line voltages ─────────────────────────────────────────────────
  - id: l12_voltage
    name: "L1-L2 Voltage"
    register_type: input
    address: 200
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: l23_voltage
    name: "L2-L3 Voltage"
    register_type: input
    address: 202
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: l31_voltage
    name: "L3-L1 Voltage"
    register_type: input
    address: 204
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "V"
    device_class: voltage
    state_class: measurement
