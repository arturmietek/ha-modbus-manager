name: "Eastron SDM630-Modbus"
manufacturer: "Eastron"
model: "SDM630-Modbus"
version: "1.0"
description: >
  3-phase energy meter. All registers are FLOAT32 big-endian (2 registers each).
  Supports import/export energy, per-phase and total: voltage, current, power,
  apparent power, reactive power, power factor, frequency, and demand values.

polling:
  max_read_count: 4     # SDM630 RTU responses for demand registers fragment above ~13 bytes

entities:

  # ── Phase voltages ────────────────────────────────────────────────────────
  - id: l1_voltage
    name: "L1 Voltage"
    register_type: input
    address: 0
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1

  - id: l2_voltage
    name: "L2 Voltage"
    register_type: input
    address: 2
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1

  - id: l3_voltage
    name: "L3 Voltage"
    register_type: input
    address: 4
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1

  # ── Phase currents ────────────────────────────────────────────────────────
  - id: l1_current
    name: "L1 Current"
    register_type: input
    address: 6
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 3

  - id: l2_current
    name: "L2 Current"
    register_type: input
    address: 8
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 3

  - id: l3_current
    name: "L3 Current"
    register_type: input
    address: 10
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 3

  # ── Phase active power ────────────────────────────────────────────────────
  - id: l1_power
    name: "L1 Power"
    register_type: input
    address: 12
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: l2_power
    name: "L2 Power"
    register_type: input
    address: 14
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: l3_power
    name: "L3 Power"
    register_type: input
    address: 16
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  # ── Phase apparent power ──────────────────────────────────────────────────
  - id: l1_apparent_power
    name: "L1 Apparent Power"
    register_type: input
    address: 18
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "VA"
    device_class: apparent_power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: l2_apparent_power
    name: "L2 Apparent Power"
    register_type: input
    address: 20
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "VA"
    device_class: apparent_power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: l3_apparent_power
    name: "L3 Apparent Power"
    register_type: input
    address: 22
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "VA"
    device_class: apparent_power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  # ── Phase reactive power ──────────────────────────────────────────────────
  # NOTE: source modbus2mqtt YAML had l2 at address 24 (same as l1) — bug.
  # Correct per SDM630 protocol: L1=24, L2=26, L3=28.
  - id: l1_reactive_power
    name: "L1 Reactive Power"
    register_type: input
    address: 24
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "var"
    device_class: reactive_power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: l2_reactive_power
    name: "L2 Reactive Power"
    register_type: input
    address: 26
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "var"
    device_class: reactive_power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: l3_reactive_power
    name: "L3 Reactive Power"
    register_type: input
    address: 28
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "var"
    device_class: reactive_power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  # ── Phase power factor ────────────────────────────────────────────────────
  # SDM630 returns -1.0..1.0 — HA power_factor device_class expects this range.
  # No scale needed (source used multiplier:100 + % unit which is also valid but
  # native float -1..1 is cleaner with HA energy dashboard).
  - id: l1_power_factor
    name: "L1 Power Factor"
    register_type: input
    address: 30
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    device_class: power_factor
    state_class: measurement
    precision: 3
    entity_category: diagnostic

  - id: l2_power_factor
    name: "L2 Power Factor"
    register_type: input
    address: 32
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    device_class: power_factor
    state_class: measurement
    precision: 3
    entity_category: diagnostic

  - id: l3_power_factor
    name: "L3 Power Factor"
    register_type: input
    address: 34
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    device_class: power_factor
    state_class: measurement
    precision: 3
    entity_category: diagnostic

  # ── Phase angles ─────────────────────────────────────────────────────────
  - id: l1_phase_angle
    name: "L1 Phase Angle"
    register_type: input
    address: 36
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "°"
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: l2_phase_angle
    name: "L2 Phase Angle"
    register_type: input
    address: 38
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "°"
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: l3_phase_angle
    name: "L3 Phase Angle"
    register_type: input
    address: 40
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "°"
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  # ── Averages ──────────────────────────────────────────────────────────────
  - id: avg_line_voltage
    name: "Average Line Voltage"
    register_type: input
    address: 42
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: avg_line_current
    name: "Average Line Current"
    register_type: input
    address: 46
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 3
    entity_category: diagnostic

  - id: sum_line_currents
    name: "Sum of Line Currents"
    register_type: input
    address: 48
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 3
    entity_category: diagnostic

  # ── Totals ────────────────────────────────────────────────────────────────
  - id: total_active_power
    name: "Total System Active Power"
    register_type: input
    address: 52
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 0

  - id: total_apparent_power
    name: "Total System Apparent Power"
    register_type: input
    address: 56
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "VA"
    device_class: apparent_power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: total_reactive_power
    name: "Total System Reactive Power"
    register_type: input
    address: 60
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "var"
    device_class: reactive_power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: total_power_factor
    name: "Total System Power Factor"
    register_type: input
    address: 62
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    device_class: power_factor
    state_class: measurement
    precision: 3
    entity_category: diagnostic

  - id: total_phase_angle
    name: "Total System Phase Angle"
    register_type: input
    address: 66
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "°"
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  # ── Power / VA demands ───────────────────────────────────────────────────
  - id: total_power_demand
    name: "Total System Power Demand"
    register_type: input
    address: 84
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
