  - id: l3_voltage_thd
    name: "L3 Voltage THD"
    register_type: input
    address: 238
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "%"
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: l1_current_thd
    name: "L1 Current THD"
    register_type: input
    address: 240
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "%"
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: l2_current_thd
    name: "L2 Current THD"
    register_type: input
    address: 242
