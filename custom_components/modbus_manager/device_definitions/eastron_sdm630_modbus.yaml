  - id: l3_current_thd
    name: "L3 Current THD"
    register_type: input
    address: 244
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "%"
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: avg_voltage_thd
    name: "Average Line to Neutral Voltage THD"
    register_type: input
    address: 248
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "%"
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: avg_current_thd
    name: "Average Line Current THD"
    register_type: input
    address: 250
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "%"
    state_class: measurement
    precision: 1
