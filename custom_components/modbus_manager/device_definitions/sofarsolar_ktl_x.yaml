name: "SofarSolar KTL-X"
manufacturer: "SofarSolar"
model: "KTL-X"
version: "1.0"
description: >
  Three-phase string inverter with dual MPPT DC inputs.
  All registers are holding type (FC03). Big-endian byte order.
  Total energy and generation hours are 32-bit (two consecutive registers).
  Default slave ID: 1. Default baud rate: 9600 bps.
  Tested register layout from modbus2mqtt v0.3.

parameters:
  rated_power_kw:
    name: "Rated Power"
    description: "Inverter nominal AC output power (e.g. 10 for KTL-X 10kW)"
    unit: "kW"
    default: 10.0
    min: 0.5
    max: 100.0

entities:

  # ── Inverter status ────────────────────────────────────────────────────────
  - id: status
    name: "Status"
    register_type: holding
    address: 0
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    value_map:
      0: "Wait"
      1: "Check"
      2: "Normal"
      3: "Fault"
      4: "Permanent Fault"

  # ── AC output — primary measurements ──────────────────────────────────────
  - id: ac_power
    name: "AC Power"
    register_type: holding
    address: 12
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 10
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 0
    validation:
      min: 0
      max: "{rated_power_kw * 1100}"   # 110% of rated power (W)
      max_delta: "{rated_power_kw * 500}"

  - id: ac_reactive_power
    name: "AC Reactive Power"
    register_type: holding
    address: 13
    entity_type: sensor
    data_type: INT16          # signed — can be negative (leading/lagging)
    byte_order: BIG
    scale: 10
    unit: "var"
    device_class: reactive_power
    state_class: measurement
    precision: 0
    entity_category: diagnostic

  - id: ac_frequency
    name: "AC Frequency"
    register_type: holding
    address: 14
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.01
    unit: "Hz"
    device_class: frequency
    state_class: measurement
    precision: 2
    entity_category: diagnostic

  - id: ac1_voltage
    name: "AC1 Voltage"
    register_type: holding
    address: 15
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: ac1_current
    name: "AC1 Current"
    register_type: holding
    address: 16
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.01
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 2
    entity_category: diagnostic

  - id: ac2_voltage
    name: "AC2 Voltage"
    register_type: holding
    address: 17
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: ac2_current
    name: "AC2 Current"
    register_type: holding
    address: 18
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.01
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 2
    entity_category: diagnostic

  - id: ac3_voltage
    name: "AC3 Voltage"
    register_type: holding
    address: 19
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: ac3_current
    name: "AC3 Current"
    register_type: holding
    address: 20
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.01
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 2
    entity_category: diagnostic

  # ── DC inputs ──────────────────────────────────────────────────────────────
  - id: dc1_voltage
    name: "DC1 Voltage"
    register_type: holding
    address: 6
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: dc1_current
    name: "DC1 Current"
    register_type: holding
    address: 7
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.01
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 2
    entity_category: diagnostic

  - id: dc1_power
    name: "DC1 Power"
    register_type: holding
    address: 10
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 10
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 0

  - id: dc2_voltage
    name: "DC2 Voltage"
    register_type: holding
    address: 8
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: dc2_current
    name: "DC2 Current"
    register_type: holding
    address: 9
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.01
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 2
    entity_category: diagnostic

  - id: dc2_power
    name: "DC2 Power"
    register_type: holding
    address: 11
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 10
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 0

  # ── Energy counters ────────────────────────────────────────────────────────
  - id: produced_kwh_total
    name: "Total Energy Produced"
    register_type: holding
    address: 21                 # 32-bit: high word at 21, low word at 22
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 1
    unit: "kWh"
    device_class: energy
    state_class: total_increasing
    precision: 0
    validation:
      min: 0
      max_delta: "{rated_power_kw * 0.5}"

  - id: produced_kwh_today
    name: "Energy Produced Today"
    register_type: holding
    address: 25
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.01
    unit: "kWh"
    device_class: energy
    state_class: total_increasing
    precision: 2
    validation:
      min: 0.0
      max: "{rated_power_kw * 12}"     # 12 peak sun hours
      max_delta: "{rated_power_kw * 0.5}"

  # ── Temperatures ───────────────────────────────────────────────────────────
  - id: module_temperature
    name: "Module Temperature"
    register_type: holding
    address: 27
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 1
    unit: "°C"
    device_class: temperature
    state_class: measurement
    precision: 0
    entity_category: diagnostic

  - id: inverter_temperature
    name: "Inverter Temperature"
    register_type: holding
    address: 28
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 1
    unit: "°C"
    device_class: temperature
    state_class: measurement
    precision: 0
    entity_category: diagnostic

  # ── Operating time ─────────────────────────────────────────────────────────
  - id: generation_hours_total
    name: "Total Generation Hours"
    register_type: holding
    address: 23                 # 32-bit: high word at 23, low word at 24
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 1
    unit: "h"
    device_class: duration
    state_class: total_increasing
    precision: 0
    entity_category: diagnostic

  - id: generation_minutes_today
    name: "Generation Minutes Today"
    register_type: holding
    address: 26
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 1
    unit: "min"
    device_class: duration
    state_class: total_increasing
    precision: 0
    entity_category: diagnostic

  # ── Bus & other ────────────────────────────────────────────────────────────
  - id: bus_voltage
    name: "Bus Voltage"
    register_type: holding
    address: 29
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: count_down_time
    name: "Count-Down Time"
    register_type: holding
    address: 32
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 1
    unit: "s"
    device_class: duration
    entity_category: diagnostic
