name: "Growatt MIC 2500TL-X"
manufacturer: "Growatt"
model: "MIC 2500TL-X"
version: "1.0"
description: >
  Single-phase grid-tie string inverter with dual MPPT (no battery).
  All registers use FC03 (holding). Default slave ID: 1. Baud rate: 9600.
  Source: modbus_local_gateway by timlaing.

poll_priority: 10

entities:

  # ── Firmware / identification ─────────────────────────────────────────────
  - id: hw_version
    name: "Firmware Version"
    register_type: holding
    address: 9
    entity_type: sensor
    data_type: STRING
    register_count: 3
    entity_category: diagnostic

  - id: sw_version
    name: "Control Firmware Version"
    register_type: holding
    address: 12
    entity_type: sensor
    data_type: STRING
    register_count: 3
    entity_category: diagnostic

  # ── Control (writable) ────────────────────────────────────────────────────
  - id: on_off
    name: "Remote On/Off"
    register_type: holding
    address: 0
    entity_type: switch

  - id: max_output_active
    name: "Max Output Power"
    register_type: holding
    address: 3
    entity_type: number
    data_type: UINT16
    unit: "%"
    min: 0
    max: 100
    precision: 0

  - id: language
    name: "LCD Language"
    register_type: holding
    address: 15
    entity_type: sensor
    data_type: UINT16
    entity_category: diagnostic
    value_map:
      0: "Italian"
      1: "English"
      2: "German"
      3: "Spanish"
      4: "French"
      5: "Chinese"
      6: "Polish"
      7: "Portuguese"
      8: "Hungarian"

  - id: com_address
    name: "Communicate Address"
    register_type: holding
    address: 30
    entity_type: number
    data_type: UINT16
    entity_category: diagnostic
    min: 1
    max: 254
    precision: 0

  # ── Inverter status ───────────────────────────────────────────────────────
  - id: machine_status
    name: "Inverter Status"
    register_type: holding
    address: 3000
    entity_type: sensor
    data_type: UINT16
    value_map:
      0: "Standby"
      1: "Normal"
      3: "Fault"
      4: "Flash"

  # ── PV inputs ─────────────────────────────────────────────────────────────
  - id: pv_total_power
    name: "PV Total Power"
    register_type: holding
    address: 3001
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 0.1
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1

  - id: pv1_voltage
    name: "PV1 Voltage"
    register_type: holding
    address: 3003
    entity_type: sensor
    data_type: UINT16
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1

  - id: pv1_current
    name: "PV1 Current"
    register_type: holding
    address: 3004
    entity_type: sensor
    data_type: UINT16
    scale: 0.1
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 2

  - id: pv1_power
    name: "PV1 Power"
    register_type: holding
    address: 3005
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 0.1
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1

  - id: pv2_voltage
    name: "PV2 Voltage"
    register_type: holding
    address: 3007
    entity_type: sensor
    data_type: UINT16
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1

  - id: pv2_current
    name: "PV2 Current"
    register_type: holding
    address: 3008
    entity_type: sensor
    data_type: UINT16
    scale: 0.1
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 2

  - id: pv2_power
    name: "PV2 Power"
    register_type: holding
    address: 3009
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 0.1
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1

  # ── Grid / output (single-phase) ──────────────────────────────────────────
  - id: output_power
    name: "Output Power"
    register_type: holding
    address: 3023
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 0.1
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1

  - id: grid_frequency
    name: "Grid Frequency"
    register_type: holding
    address: 3025
    entity_type: sensor
    data_type: UINT16
    scale: 0.01
    unit: "Hz"
    device_class: frequency
    state_class: measurement
    precision: 3

  - id: voltage
    name: "Grid Voltage"
    register_type: holding
    address: 3026
    entity_type: sensor
    data_type: UINT16
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1

  - id: current
    name: "Grid Current"
    register_type: holding
    address: 3027
    entity_type: sensor
    data_type: UINT16
    scale: 0.1
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 2

  # ── Energy counters ───────────────────────────────────────────────────────
  - id: energy_today
    name: "Energy Today"
    register_type: holding
    address: 3049
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 0.1
    unit: "kWh"
    device_class: energy
    state_class: total
    precision: 2

  - id: energy_total
    name: "Energy Total"
    register_type: holding
    address: 3051
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 0.1
    unit: "kWh"
    device_class: energy
    state_class: total_increasing
    precision: 2

  - id: pv_energy_total
    name: "PV Energy Total"
    register_type: holding
    address: 3053
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 0.1
    unit: "kWh"
    device_class: energy
    state_class: total_increasing
    precision: 2

  - id: pv1_energy_today
    name: "PV1 Energy Today"
    register_type: holding
    address: 3055
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 0.1
    unit: "kWh"
    device_class: energy
    state_class: total
    precision: 2

  - id: pv1_energy_total
    name: "PV1 Energy Total"
    register_type: holding
    address: 3057
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 0.1
    unit: "kWh"
    device_class: energy
    state_class: total_increasing
    precision: 2

  - id: pv2_energy_today
    name: "PV2 Energy Today"
    register_type: holding
    address: 3059
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 0.1
    unit: "kWh"
    device_class: energy
    state_class: total
    precision: 2

  - id: pv2_energy_total
    name: "PV2 Energy Total"
    register_type: holding
    address: 3061
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 0.1
    unit: "kWh"
    device_class: energy
    state_class: total_increasing
    precision: 2

  # ── Diagnostics ───────────────────────────────────────────────────────────
  - id: derating_mode
    name: "Derating Mode"
    register_type: holding
    address: 3086
    entity_type: sensor
    data_type: UINT16
    entity_category: diagnostic
    value_map:
      0: "No Derating"
      1: "PV High"
      2: "Power Constant"
      3: "Grid Voltage High"
      4: "Frequency High"
      5: "DC Source Mode"
      6: "Inverter Temp"
      7: "Active Power Order"
      8: "Load Speed"
      9: "Over Back By Time"
      10: "Internal Temp"
      11: "Output Temp"
      12: "Line Impedance"

  - id: temperature_inverter
    name: "Inverter Temperature"
    register_type: holding
    address: 3093
    entity_type: sensor
    data_type: UINT16
    scale: 0.1
    unit: "°C"
    device_class: temperature
    state_class: measurement
    precision: 1

  - id: temperature_ipm
    name: "IPM Temperature"
    register_type: holding
    address: 3094
    entity_type: sensor
    data_type: UINT16
    scale: 0.1
    unit: "°C"
    device_class: temperature
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: temperature_boost
    name: "Boost Temperature"
    register_type: holding
    address: 3095
    entity_type: sensor
    data_type: UINT16
    scale: 0.1
    unit: "°C"
    device_class: temperature
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: p_bus_voltage
    name: "P Bus Voltage"
    register_type: holding
    address: 3098
    entity_type: sensor
    data_type: UINT16
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: n_bus_voltage
    name: "N Bus Voltage"
    register_type: holding
    address: 3099
    entity_type: sensor
    data_type: UINT16
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: power_factor
    name: "Output Power Factor"
    register_type: holding
    address: 3100
    entity_type: sensor
    data_type: UINT16
    device_class: power_factor
    state_class: measurement

  - id: fault_code
    name: "Fault Code"
    register_type: holding
    address: 3105
    entity_type: sensor
    data_type: UINT16
    entity_category: diagnostic

  - id: warning_code
    name: "Warning Code"
    register_type: holding
    address: 3106
    entity_type: sensor
    data_type: UINT16
    entity_category: diagnostic
