name: "Eastron SDM120-M"
manufacturer: "Eastron"
model: "SDM120-M"
version: "1.0"
description: >
  Single-phase DIN-rail energy meter with Modbus RTU.
  All measurement registers are FLOAT32 big-endian (2 registers each).
  Default slave ID: 1. Default baud rate: 2400 bps.

entities:

  # ── Primary measurements ───────────────────────────────────────────────────
  - id: voltage
    name: "Voltage"
    register_type: input
    address: 0
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1

  - id: current
    name: "Current"
    register_type: input
    address: 6
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 3

  - id: active_power
    name: "Active Power"
    register_type: input
    address: 12
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 0

  - id: total_active_energy
    name: "Total Active Energy"
    register_type: input
    address: 342
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "kWh"
    device_class: energy
    state_class: total_increasing
    precision: 1

  - id: import_active_energy
    name: "Import Active Energy"
    register_type: input
    address: 72
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "kWh"
    device_class: energy
    state_class: total_increasing
    precision: 1

  - id: export_active_energy
    name: "Export Active Energy"
    register_type: input
    address: 74
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "kWh"
    device_class: energy
    state_class: total_increasing
    precision: 1

  # ── Diagnostic measurements ────────────────────────────────────────────────
  - id: apparent_power
    name: "Apparent Power"
    register_type: input
    address: 18
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "VA"
    device_class: apparent_power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: reactive_power
    name: "Reactive Power"
    register_type: input
    address: 24
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "var"
    device_class: reactive_power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: power_factor
    name: "Power Factor"
    register_type: input
    address: 30
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    device_class: power_factor
    state_class: measurement
    precision: 3
    entity_category: diagnostic

  - id: frequency
    name: "Frequency"
    register_type: input
    address: 70
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "Hz"
    device_class: frequency
    state_class: measurement
    precision: 2
    entity_category: diagnostic

  - id: import_reactive_energy
    name: "Import Reactive Energy"
    register_type: input
    address: 76
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "kvarh"
    device_class: reactive_energy
    state_class: total_increasing
    precision: 1
    entity_category: diagnostic

  - id: export_reactive_energy
    name: "Export Reactive Energy"
    register_type: input
    address: 78
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "kvarh"
    device_class: reactive_energy
    state_class: total_increasing
    precision: 1
    entity_category: diagnostic

  - id: total_reactive_energy
    name: "Total Reactive Energy"
    register_type: input
    address: 344
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "kvarh"
    device_class: reactive_energy
    state_class: total_increasing
    precision: 1
    entity_category: diagnostic

  - id: total_power_demand
    name: "Total Power Demand"
    register_type: input
    address: 84
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: max_total_power_demand
    name: "Max Total Power Demand"
    register_type: input
    address: 86
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: import_power_demand
    name: "Import Power Demand"
    register_type: input
    address: 88
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: max_import_power_demand
    name: "Max Import Power Demand"
    register_type: input
    address: 90
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: export_power_demand
    name: "Export Power Demand"
    register_type: input
    address: 92
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: max_export_power_demand
    name: "Max Export Power Demand"
    register_type: input
    address: 94
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: max_current_demand
    name: "Max Current Demand"
    register_type: input
    address: 264
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 3
    entity_category: diagnostic

  # ── Device config registers ────────────────────────────────────────────────
  - id: baud_rate
    name: "Baud Rate"
    register_type: holding
    address: 28
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    readonly: true
    entity_category: diagnostic
    value_map:
      0: "2400 bps"
      1: "4800 bps"
      2: "9600 bps"
      3: "19200 bps"
      4: "38400 bps"

  - id: meter_id
    name: "Meter ID"
    register_type: holding
    address: 20
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    readonly: true
    precision: 0
    entity_category: diagnostic

  - id: measurement_mode
    name: "Measurement Mode"
    register_type: holding
    address: 63776
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    readonly: true
    entity_category: diagnostic
    value_map:
      1: "Total consumption"
      2: "Consumption + generation"
      3: "Net consumption"

  - id: relay_pulse_width
    name: "Relay Pulse Width"
    register_type: holding
    address: 12
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    readonly: true
    precision: 0
    entity_category: diagnostic

  - id: pulse1_output_mode
    name: "Pulse 1 Output Mode"
    register_type: holding
    address: 86
    entity_type: sensor
    data_type: FLOAT32
    byte_order: BIG
    readonly: true
    precision: 0
    entity_category: diagnostic

  # ── Device identification ──────────────────────────────────────────────────
  - id: serial_number
    name: "Serial Number"
    register_type: holding
    address: 64512
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    readonly: true
    precision: 0
    entity_category: diagnostic

  - id: meter_code
    name: "Meter Code"
    register_type: holding
    address: 64514
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    readonly: true
    precision: 0
    entity_category: diagnostic

  - id: software_version
    name: "Software Version"
    register_type: holding
    address: 64515
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    readonly: true
    precision: 0
    entity_category: diagnostic
