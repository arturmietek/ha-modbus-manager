name: "SofarSolar TL-G3"
manufacturer: "SofarSolar"
model: "TL-G3"
version: "1.0"
description: >
  Single-phase string inverter with single MPPT DC input.
  All registers are holding type (FC03). Big-endian byte order.
  Total energy and generation hours are 32-bit (two consecutive registers).
  Default slave ID: 1. Default baud rate: 9600 bps.
  Register map identical to KTL-X except no DC2 and no AC2/AC3 phases.
  Tested register layout from modbus2mqtt v0.3.

parameters:
  rated_power_kw:
    name: "Rated Power"
    description: "Inverter nominal AC output power (e.g. 1.6 for TL-G3 1600)"
    unit: "kW"
    default: 2.0
    min: 0.5
    max: 20.0

entities:

  # ── Inverter status ────────────────────────────────────────────────────────
  - id: status
    name: "Status"
    register_type: holding
    address: 0
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    value_map:
      0: "Wait"
      1: "Check"
      2: "Normal"
      3: "Fault"
      4: "Permanent Fault"

  # ── AC output — primary measurements ──────────────────────────────────────
  - id: ac_power
    name: "AC Power"
    register_type: holding
    address: 12
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 10
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 0
    validation:
      min: 0
      max: "{rated_power_kw * 1100}"
      max_delta: "{rated_power_kw * 500}"

  - id: ac_reactive_power
    name: "AC Reactive Power"
    register_type: holding
    address: 13
    entity_type: sensor
    data_type: INT16
    byte_order: BIG
    scale: 10
    unit: "var"
    device_class: reactive_power
    state_class: measurement
    precision: 0
    entity_category: diagnostic

  - id: ac_frequency
    name: "AC Frequency"
    register_type: holding
    address: 14
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.01
    unit: "Hz"
    device_class: frequency
    state_class: measurement
    precision: 2
    entity_category: diagnostic

  - id: ac1_voltage
    name: "AC Voltage"
    register_type: holding
    address: 15
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: ac1_current
    name: "AC Current"
    register_type: holding
    address: 16
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.01
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 2
    entity_category: diagnostic

  # ── DC input ───────────────────────────────────────────────────────────────
  - id: dc1_voltage
    name: "DC Voltage"
    register_type: holding
    address: 6
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: dc1_current
    name: "DC Current"
    register_type: holding
    address: 7
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.01
    unit: "A"
    device_class: current
    state_class: measurement
    precision: 2
    entity_category: diagnostic

  - id: dc1_power
    name: "DC Power"
    register_type: holding
    address: 10
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 10
    unit: "W"
    device_class: power
    state_class: measurement
    precision: 0

  # ── Energy counters ────────────────────────────────────────────────────────
  - id: produced_kwh_total
    name: "Total Energy Produced"
    register_type: holding
    address: 21                 # 32-bit: high word at 21, low word at 22
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 1
    unit: "kWh"
    device_class: energy
    state_class: total_increasing
    precision: 0
    validation:
      min: 0
      max_delta: "{rated_power_kw * 0.5}"

  - id: produced_kwh_today
    name: "Energy Produced Today"
    register_type: holding
    address: 25
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.01
    unit: "kWh"
    device_class: energy
    state_class: total_increasing
    precision: 2
    validation:
      min: 0.0
      max: "{rated_power_kw * 12}"
      max_delta: "{rated_power_kw * 0.5}"

  # ── Temperatures ───────────────────────────────────────────────────────────
  - id: module_temperature
    name: "Module Temperature"
    register_type: holding
    address: 27
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 1
    unit: "°C"
    device_class: temperature
    state_class: measurement
    precision: 0
    entity_category: diagnostic

  - id: inverter_temperature
    name: "Inverter Temperature"
    register_type: holding
    address: 28
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 1
    unit: "°C"
    device_class: temperature
    state_class: measurement
    precision: 0
    entity_category: diagnostic

  # ── Operating time ─────────────────────────────────────────────────────────
  - id: generation_hours_total
    name: "Total Generation Hours"
    register_type: holding
    address: 23                 # 32-bit: high word at 23, low word at 24
    entity_type: sensor
    data_type: UINT32
    byte_order: BIG
    scale: 1
    unit: "h"
    device_class: duration
    state_class: total_increasing
    precision: 0
    entity_category: diagnostic

  - id: generation_minutes_today
    name: "Generation Minutes Today"
    register_type: holding
    address: 26
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 1
    unit: "min"
    device_class: duration
    state_class: total_increasing
    precision: 0
    entity_category: diagnostic

  # ── Bus & other ────────────────────────────────────────────────────────────
  - id: bus_voltage
    name: "Bus Voltage"
    register_type: holding
    address: 29
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 0.1
    unit: "V"
    device_class: voltage
    state_class: measurement
    precision: 1
    entity_category: diagnostic

  - id: count_down_time
    name: "Count-Down Time"
    register_type: holding
    address: 32
    entity_type: sensor
    data_type: UINT16
    byte_order: BIG
    scale: 1
    unit: "s"
    device_class: duration
    entity_category: diagnostic
